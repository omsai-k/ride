apiVersion: apps/v1
kind: Deployment
metadata:
  name: ride-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ride-backend
  template:
    metadata:
      labels:
        app: ride-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/example/ride-backend:latest
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: ride-backend
spec:
  selector:
    app: ride-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
